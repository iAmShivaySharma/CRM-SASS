name: CI

on:
  pull_request:
    branches: [main, develop, release/*]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"

jobs:
  # ── Lint & Type Check ─────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format:check

  # ── Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 7

  # ── Integration Tests ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true
          MONGODB_URI: mongodb://localhost:27017/crm_test
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production

  # ── E2E Tests (only on PRs to main) ──────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (no lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/crm_test
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production

      - name: Seed test DB
        run: npm run db:seed
        env:
          MONGODB_URI: mongodb://localhost:27017/crm_test
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production

      - name: Run E2E
        run: npm run test:e2e -- --project=chromium
        env:
          CI: true
          MONGODB_URI: mongodb://localhost:27017/crm_test
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ── Security Audit (quick) ────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level high --production

  # ── PR Gate ───────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [quality, unit-tests, integration-tests, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
