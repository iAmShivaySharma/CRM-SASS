name: Deploy to GKE

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled]
    branches: [main, develop, release/*]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev
  REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  IMAGE: ${{ vars.IMAGE_NAME }}

jobs:
  resolve:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      should_deploy: ${{ steps.env.outputs.should_deploy }}
    steps:
      - name: Determine environment
        id: env
        env:
          EVENT: ${{ github.event_name }}
          LABEL: ${{ github.event.label.name }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$EVENT" == "push" && "$REF" == "refs/heads/main" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "pull_request" && "$LABEL" == "READY TO DEV" ]]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "pull_request" && "$LABEL" == "READY FOR QA" ]]; then
            echo "environment=qa" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "pull_request" && "$LABEL" == "READY TO RELEASE" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "environment=" >> "$GITHUB_OUTPUT"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build & Deploy to GKE
    needs: resolve
    if: needs.resolve.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          docker build -f docker/Dockerfile \
            -t ${IMAGE_TAG}:${{ github.sha }} \
            -t ${IMAGE_TAG}:latest \
            .
          docker push ${IMAGE_TAG}:${{ github.sha }}
          docker push ${IMAGE_TAG}:latest

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Set image in kustomization
        run: |
          ENV=${{ needs.resolve.outputs.environment }}
          cd k8s/overlays/${ENV}
          kustomize edit set image \
            asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Create namespace if not exists
        run: |
          ENV=${{ needs.resolve.outputs.environment }}
          kubectl create namespace crm-saas-${ENV} --dry-run=client -o yaml | kubectl apply -f -

      - name: Recreate deployment if selector labels changed
        run: |
          ENV=${{ needs.resolve.outputs.environment }}
          SELECTOR=$(kubectl -n crm-saas-${ENV} get deployment ${ENV}-crm-app -o jsonpath='{.spec.selector.matchLabels}' 2>/dev/null || echo "")
          if echo "$SELECTOR" | grep -q "app.kubernetes.io/managed-by"; then
            echo "Old commonLabels detected in selector, deleting deployment for migration..."
            kubectl -n crm-saas-${ENV} delete deployment ${ENV}-crm-app
          else
            echo "Selector is clean, skipping"
          fi

      - name: Deploy to GKE
        run: |
          ENV=${{ needs.resolve.outputs.environment }}
          kubectl apply -k k8s/overlays/${ENV}
          kubectl -n crm-saas-${ENV} rollout status deployment/${ENV}-crm-app --timeout=600s

      - name: Verify deployment
        run: |
          ENV=${{ needs.resolve.outputs.environment }}
          kubectl -n crm-saas-${ENV} get pods
          kubectl -n crm-saas-${ENV} get svc
