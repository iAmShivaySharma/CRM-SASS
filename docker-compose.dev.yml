services:
  # Local MongoDB for development
  mongodb-dev:
    image: mongo:7.0
    container_name: crm-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-localdev123}
      MONGO_INITDB_DATABASE: crm_database
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - crm-dev-network

  app-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: crm-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
    depends_on:
      - mongodb-dev
    networks:
      - crm-dev-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_dev_data:
    driver: local

networks:
  crm-dev-network:
    driver: bridge