apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-app
spec:
  rules:
    - host: dev.crm.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-crm-app
                port:
                  name: http
  tls:
    - hosts:
        - dev.crm.example.com
      secretName: crm-tls-dev
